# Phase 1 — refresh every pipeline's dataset once a month.
#
# For each pipeline under pipelines/: gate on the offline tests, then run a LIVE
# full rebuild (retrieve → audit → clean → audit/reconcile → publish). The
# composite-key de-dup inside clean.run() makes the rebuild an append: the new
# CSV is a superset of last month plus the new rows, and it self-heals upstream
# revisions/backfills a pure windowed append would miss.
#
# Review & persistence (interim, until Dataverse is wired — see the seam below):
#   * the audit summary is written to the run's Job Summary for a human to scan;
#   * the deliverable + audit reports are uploaded as a workflow artifact.
# The canonical home is a Dataverse dataset; that publish step is scaffolded and
# safely no-ops until its secrets + conventions land (data-project-skill).
name: monthly-data-refresh

on:
  schedule:
    - cron: "0 9 1 * *"         # 09:00 UTC on the 1st of each month (cron is always UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: "live | demo (demo = offline dry-run of the whole flow)"
        default: "live"

concurrency:                     # never let two refreshes of the same scope overlap
  group: monthly-data-refresh
  cancel-in-progress: false

permissions:
  contents: read                 # outputs go to artifacts / Dataverse, not git

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120         # RISE full-history pulls are large (records to the 1930s)
    strategy:
      fail-fast: false
      matrix:
        include:
          - pipeline: reservoir-storage
            module: reservoir
          - pipeline: streamflow
            module: streamflow
          - pipeline: snowpack
            module: snowpack
    defaults:
      run:
        working-directory: pipelines/${{ matrix.pipeline }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Gate — offline tests
        run: uv run pytest -q

      - name: Refresh — retrieve → audit → clean → audit/reconcile → publish
        env:
          CDSS_API_KEY: ${{ secrets.CDSS_API_KEY }}   # optional; raises CDSS rate limits
          # streamflow only: slow the DWR pull so the full-history burst doesn't trip
          # the CDSS 403 IP throttle when no API key is set (reservoir ignores it).
          STREAMFLOW_RATE_LIMIT: "2"
        run: uv run python -m ${{ matrix.module }}.pipeline --mode ${{ github.event.inputs.mode || 'live' }} --fresh

      - name: Surface the audit summary in the run
        if: always()
        run: |
          {
            echo "## ${{ matrix.pipeline }} — monthly refresh"
            if [ -f data/audit/summary-latest.md ]; then
              cat data/audit/summary-latest.md
            else
              echo "_No summary produced — retrieval or clean failed; see the step logs._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Archive outputs (interim persistence until Dataverse is wired)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pipeline }}-${{ github.run_id }}
          path: |
            pipelines/${{ matrix.pipeline }}/data/processed/*.csv
            pipelines/${{ matrix.pipeline }}/data/audit/*.md
            pipelines/${{ matrix.pipeline }}/data/audit/*.json
          if-no-files-found: warn
          retention-days: 90

      # ── Dataverse deposit (canonical home — Harvard Dataverse, L5) ─────────────
      # The deposit kit lives in pipelines/<pipeline>/dataverse/ (generated from the
      # data-project-skill, PR #7). CI VALIDATES it on every run, and — when opted
      # in via the DATAVERSE_DEPOSIT repo variable — uploads the freshly rebuilt
      # data/processed to a DRAFT. It NEVER publishes a DOI unattended: per the
      # skill's rule, a deposit stops at a draft for human review before publish.
      - name: Validate the Dataverse deposit kit (dry-run)
        if: always()
        run: |
          if [ -f dataverse/deposit_dataverse.py ]; then
            DRY_RUN=1 uv run python dataverse/deposit_dataverse.py --no-publish
          else
            echo "No dataverse/ kit for ${{ matrix.pipeline }} — skipping."
          fi

      - name: Deposit to Dataverse (draft; opt-in, never publishes)
        if: ${{ vars.DATAVERSE_DEPOSIT == 'true' }}
        env:
          DATAVERSE_URL: ${{ vars.DATAVERSE_URL }}               # e.g. https://dataverse.harvard.edu
          DATAVERSE_COLLECTION: ${{ vars.DATAVERSE_COLLECTION }} # target collection alias (must exist + be published)
          DATAVERSE_API_TOKEN: ${{ secrets.DATAVERSE_API_TOKEN }}
        run: |
          if [ -z "$DATAVERSE_API_TOKEN" ]; then
            echo "DATAVERSE_DEPOSIT=true but the DATAVERSE_API_TOKEN secret is unset — skipping deposit."
            echo "Interim deliverable remains the uploaded artifact above."
            exit 0
          fi
          uv sync --extra publish          # installs pyDataverse
          uv run python dataverse/deposit_dataverse.py --no-publish   # draft only; a human publishes the DOI
