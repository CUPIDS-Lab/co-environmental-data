# Non-secret per-source configuration for the climate-stations pipeline.
# Edited by hand; read by climate_stations.config.load_sources_config().
# Secrets (the CDSS API key) come from the environment / dwr_api.json, never here.
#
# ✅ CONFIRMED markers were verified against the live API on 2026-06-22 (see
#    docs/survey-notes.md). The request machinery, the endpoint, the date keys, the
#    measType vocabulary, and the per-measType units all returned data; re-confirm on
#    any future contract change.

cdss_climate:
  base_url: "https://dwr.state.co.us/Rest/GET/api/v2"
  timeseries_endpoint: "climatedata/climatestationtsday/"   # ✅ confirmed live
  stations_endpoint: "climatedata/climatestations/"         # ✅ catalog (12,704 CO stations)
  # The 12 daily measTypes the endpoint serves (✅ enumerated from
  # referencetables/climatestationmeastype). One measType per request. The canonical
  # variable + unit for each lives in climate_stations.schema.MEAS_MAP.
  meas_types:
    - Evap         # pan evaporation (in)
    - FrostDate    # rare; daily-series unit unconfirmed — carried defensively
    - MaxTemp      # daily maximum temperature (degF)
    - MeanTemp     # daily mean temperature (degF)
    - MinTemp      # daily minimum temperature (degF)
    - Precip       # precipitation (in)
    - Snow         # snowfall (in)
    - SnowDepth    # snow depth on ground (in)
    - SnowSWE      # snow water equivalent (in) — overlaps SNOTEL / snowpack #11
    - Solar        # solar radiation (mJ/m^2)
    - VP           # vapor pressure (kPa)
    - Wind         # wind run (KM/day)
  start_date: "01/01/1900"   # MM/DD/YYYY; CDSS clamps to each station's POR
  end_date: ""               # empty = today
  page_size: 50000           # daily POR fits one page for a single (station, measType)
  notes: >
    ✅ CONFIRMED live (2026-06): GET climatedata/climatestationtsday/?format=json&
    stationNum=<int>&measType=<MaxTemp|Precip|SnowSWE|...>&min-measDate=MM/DD/YYYY&
    max-measDate=MM/DD/YYYY&pageSize=<n>&apiKey=<key>. A station identifier
    (stationNum OR siteId) is REQUIRED — a measType-only query returns
    "Error: (stationNum or siteId) required for this search". Date keys are
    min-measDate / max-measDate (NOT startDate). Row fields: {stationNum, siteId,
    measType, measDate (ISO + tz), value, flagA..flagD, dataSource, modified,
    measUnit}. measUnit VARIES by measType (degF temps; in precip/snow/SWE/depth/
    evap; mJ/m^2 Solar; kPa VP; KM Wind) — harmonize per concept, not globally. A
    "zero records" response (HTTP 404 / a string body) means no data for that
    (station, measType) — a station does not report every measure. ⚠️ Anonymous
    daily/row limits took effect 2025-12-10; a keyless pull returns "Error: Exceeded
    Daily Data Limit". Set CDSS_API_KEY (dwr_api.json) for any real pull.
