# Non-secret per-source configuration for the reservoir-storage pipeline.
# Edited by hand; read by reservoir.config.load_sources_config().
# Secrets (API keys) come from the environment / .env, never from here.
#
# ⚠️ Lines marked VERIFY are best-known values to confirm against the live API
#    on the first real run (see docs/survey-notes.md). The request *machinery*
#    is correct; these specific codes/URLs are the confirmation points.

dwr_cdss:
  base_url: "https://dwr.state.co.us/Rest/GET/api/v2"
  timeseries_endpoint: "telemetrystations/telemetrytimeseriesday/"   # ✅ confirmed live
  start_date: "01/01/1900"   # early bound for FULL history; CDSS clamps to each site's POR
  end_date: ""               # empty = today (both bounds REQUIRED for full history)
  parameters:            # canonical variable -> CDSS parameter code  # ✅ confirmed live
    storage_af: "STORAGE"
    elevation_ft: "ELEV"
  notes: >
    ✅ CONFIRMED live (2026-06): value=`measValue`, date=`measDate`; abbrevs are codes
    (GREEN MOUNTAIN RESERVOIR -> GRERESCO …). FULL HISTORY needs BOTH startDate AND
    endDate (MM/DD/YYYY): no date params returns only the last ~365 days; startDate
    alone -> HTTP 404; start+end returns the full record auto-clamped to each
    station's period of record (stationPorStart/End in the telemetrystation record).
    404 "zero records" is handled as no-data. apiKey raises rate limits.

reclamation_rise:
  base_url: "https://data.usbr.gov/rise/api"      # ✅ API host (portal is rise.reclamation.gov)
  start_date: "1900-01-01"   # full history; RISE pulls are large (records back to the 1930s–50s)
  notes: >
    ✅ CONFIRMED live (2026-06). JSON:API; /result?itemId=<id> returns
    data[].attributes.{dateTime, result}. Per-reservoir item ids in
    reservoirs.csv (rise_item_ids). ENUMERATION (the reliable path, since
    locationId[]/search filters on catalog-item are broken): location?search=<name>
    -> pick the Lake/Reservoir match -> location/<id>?include=catalogRecords.catalogItems
    -> map parameterName (Lake/Reservoir Storage|Elevation|Release - Total) to item
    id. Implemented in reservoir.stations (parse_rise_location_items). 17/20 seed
    reservoirs resolved; crystal/powell/taylor-park still TODO (search-term tuning).

# ⚠️ FINDING (2026-06): Northern Water's ArcGIS Hub (data-nw.opendata.arcgis.com)
# publishes ONLY 4 spatial-boundary datasets (Boundary, Inclusions, Subdistrict
# Boundary/Inclusions) — NO reservoir-storage time series exist there. The C-BT
# reservoirs Northern operates (Carter, Horsetooth, Granby, Shadow Mountain,
# Willow Creek, Lake Estes, Marys Lake, Pinewood) are Reclamation-owned and their
# storage is in RISE — they have been moved to the reclamation_rise source.
# Grand Lake (natural) and Boulder Reservoir (municipal) have no open storage
# series anywhere. northern_water is therefore NOT an active storage source; the
# parser/field_map below stay only in case a real-time service is found later.
northern_water:
  base_url: "https://data-nw.opendata.arcgis.com"
  feature_service_url: ""   # none found — hub has boundaries only (see finding above)
  field_map:
    datetime: "DATE"
    reservoir_id: "STATION_ID"
    reservoir_name: "NAME"
    variables:
      storage_af: "STORAGE_AF"
      elevation_ft: "ELEV_FT"
  notes: >
    Boundaries-only hub; no reservoir-storage FeatureServer exists. C-BT reservoir
    storage is sourced from RISE instead (see finding above).
